<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Farm Friends</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="panel-root">
      <header class="panel-header">
        <h1>Farm Friends</h1>
        <p class="subtitle">Grow crops, help your neighbors.</p>
      </header>

      <section class="hud">
        <div id="food-bank-counter" class="food-bank-counter">Friends Helped: 0</div>
        <div class="seed-row">
          <label for="seed-select">Seed</label>
          <select id="seed-select" aria-label="Select seed type">
            <option value="carrot">Carrot</option>
            <option value="tomato">Tomato</option>
            <option value="sunflower">Sunflower</option>
          </select>
        </div>
        <div id="inventory-strip" class="inventory-strip">Inventory: carrot 0 · tomato 0 · sunflower 0 · coins 0</div>
        <div class="actions-row">
          <button id="plant-button" type="button">Plant</button>
          <button id="donate-button" type="button">Donate</button>
          <button id="shop-button" type="button">Shop</button>
        </div>
        <div id="status-message" class="status-message" role="status" aria-live="polite"></div>
      </section>

      <section class="canvas-wrap" aria-label="Farm canvas region">
        <canvas id="farm-canvas" width="360" height="420"></canvas>
      </section>

      <section id="shop-modal-placeholder" class="shop-placeholder" aria-hidden="true">
        Shop modal placeholder
      </section>

      <div id="milestone-overlay" class="milestone-overlay" aria-live="polite" hidden></div>
    </main>

    <script type="module" src="./js/main.js"></script>
  </body>
</html>
